name: Promote Icebox to Backlog

on:
  projects_v2_item:
    types: [edited]

permissions:
  issues: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          STATUS_FIELD_ID: ${{ vars.STATUS_FIELD_ID }}
          BACKLOG_OPTION_ID: ${{ vars.BACKLOG_OPTION_ID }}
          IDEA_STAGE_FIELD: ${{ vars.IDEA_STAGE_FIELD }}
          BUG_STAGE_FIELD: ${{ vars.BUG_STAGE_FIELD }}
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { PROJECT_ID, STATUS_FIELD_ID, BACKLOG_OPTION_ID, IDEA_STAGE_FIELD, BUG_STAGE_FIELD } = process.env;
            const WATCHED_FIELDS = new Set([IDEA_STAGE_FIELD, BUG_STAGE_FIELD]);

            const { payload } = context;
            const changedField = payload.changes?.field_value?.field_node_id;
            if (!WATCHED_FIELDS.has(changedField)) return;

            const itemNodeId = payload.projects_v2_item.node_id;

            const { node } = await github.graphql(`
              query($id: ID!) {
                node(id: $id) {
                  ... on ProjectV2Item {
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field { ... on ProjectV2SingleSelectField { id name } }
                        }
                      }
                    }
                    content {
                      ... on Issue {
                        number
                        labels(first: 20) { nodes { name } }
                        repository { name owner { login } }
                      }
                    }
                  }
                }
              }
            `, { id: itemNodeId });

            const issue = node.content;
            if (!issue) return;
            if (issue.repository.name !== context.repo.repo || issue.repository.owner.login !== context.repo.owner) return;

            const fieldValues = node.fieldValues.nodes;
            const ideaStage = fieldValues.find(v => v.field?.name === 'Idea Stage');
            const bugStage  = fieldValues.find(v => v.field?.name === 'Bug Stage');

            const isIceboxPromotion = changedField === IDEA_STAGE_FIELD && ideaStage?.name === 'Promotable';
            const isBugPromotion    = changedField === BUG_STAGE_FIELD  && bugStage?.name  === 'Prioritized';

            if (!isIceboxPromotion && !isBugPromotion) return;

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }
            `, { projectId: PROJECT_ID, itemId: itemNodeId, fieldId: STATUS_FIELD_ID, optionId: BACKLOG_OPTION_ID });

            const clearFieldId = isIceboxPromotion ? IDEA_STAGE_FIELD : BUG_STAGE_FIELD;
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!) {
                clearProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId
                }) { projectV2Item { id } }
              }
            `, { projectId: PROJECT_ID, itemId: itemNodeId, fieldId: clearFieldId });

            if (isIceboxPromotion && issue.labels.nodes.some(l => l.name === 'icebox')) {
              await github.rest.issues.removeLabel({
                owner: issue.repository.owner.login,
                repo: issue.repository.name,
                issue_number: issue.number,
                name: 'icebox'
              });
            }

            const kind = isIceboxPromotion ? 'idea' : 'bug';
            core.info(`Promoted ${kind} ${issue.repository.name}#${issue.number} to Backlog`);
